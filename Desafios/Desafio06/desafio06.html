<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
   <h1>Tags HTMl</h1> 
   <p>Em HTML5 podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
   <ol>
    <li><abbr title="Utilize a tag <p> ">Págrafos</li>
    <li><abbr title="Use <h1>...<h6>">Títulos</abbr></li>
    <li><abbr title="Use <img>">Imagens</abbr>
    <li><abbr title="Use <abbr>">Abreviações</abbr></li>
    <li><abbr title="Use a tag <code>">Códigos-Fonte</abbr></li>
    <li><abbr title="Use <ol> e <li>">Listas numeradas</abbr></li>
    <li><abbr title="Use <ul> e <li>">Listas com demarcadores</abbr></li>
   </ol>
</body>
</html>
